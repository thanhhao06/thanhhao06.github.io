<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Azaki - Blog</title>
  <link rel="stylesheet" href="/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body data-page="note">
  <header class="navbar">
    <a href="/" class="logo">Azaki</a>
    <nav>
      <a href="/">HOME</a>
      <a href="/blog/" class="active">BLOG</a>
      <a href="/project/">PROJECT</a>
      <a href="/skill/">SKILL</a>
      <a href="/contact/">CONTACT</a>
    </nav>
  </header>

  <main class="note-page" id="notePage">
    <div class="note-layout">
      <article class="note-card">
        <div class="note-toolbar">
          <div class="note-toolbar-actions">
            <a class="btn btn-ghost" href="/blog/">← Quay lại Blog</a>
          </div>
          <div class="note-file" id="noteFileName"></div>
        </div>

        <h1 class="note-title" id="noteTitle">Đang tải...</h1>
        <div class="note-content" id="noteContent"></div>
      </article>

      <aside class="note-sidebar" id="noteSidebar" aria-label="Mục lục bài viết">
        <div class="note-sidebar-head">
          <div class="note-toc-title-wrap">
            <p>On this page</p>
            <h3 id="noteTocTitle">Mục lục</h3>
          </div>

          <button
            class="toc-toggle-btn"
            id="tocToggleBtn"
            type="button"
            aria-label="Ẩn hiện mục lục"
            aria-expanded="true"
            title="Ẩn mục lục"
          >
            <span></span>
            <span></span>
            <span></span>
          </button>
        </div>

        <div class="note-toc-body" id="noteTocBody">
          <nav class="note-toc-links" id="noteTocLinks">
            <span class="toc-empty-text">Đang tạo mục lục...</span>
          </nav>
        </div>
      </aside>
    </div>
  </main>

  <script src="/app.js"></script>
</body>
</html>
